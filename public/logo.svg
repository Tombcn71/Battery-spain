<svg width="300" height="80" viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .logo-text { font-family: Arial, sans-serif; font-size: 36px; font-weight: bold; letter-spacing: -1px; }
    </style>
  </defs>

  <!-- JAROLITIO as one word with JARO orange and LITIO black -->
